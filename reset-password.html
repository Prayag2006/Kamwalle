<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamwalle - Reset Password</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f4f7f6;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .reset-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo-box {
            margin-bottom: 24px;
        }
        .logo-box h2 {
            color: #10b981;
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }
        .reset-title {
            color: #1f2937;
            margin-bottom: 8px;
            font-size: 20px;
        }
        .reset-desc {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }
        .input-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        .input-group input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        .btn-reset {
            background: #10b981;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-reset:hover {
            background: #059669;
        }
        .btn-reset:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .alert-error {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        .alert-success {
            background: #d1fae5;
            color: #047857;
            border: 1px solid #a7f3d0;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="logo-box">
            <h2>KAMWALLE</h2>
        </div>
        <h3 class="reset-title">Setup New Password</h3>
        <p class="reset-desc">Enter your new secure password below.</p>

        <div id="errorAlert" class="alert alert-error"></div>
        <div id="successAlert" class="alert alert-success"></div>

        <form id="resetPasswordForm">
            <div class="input-group">
                <i class="ph ph-lock-key"></i>
                <input type="password" id="newPassword" placeholder="New Password" required minlength="6">
            </div>
            <button type="submit" id="resetBtn" class="btn-reset">Update Password</button>
        </form>
    </div>

    <!-- Firebase SDK Logic directly in the page to handle confirmation quickly -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtJR1H_LDRD57whrjRt-5TCWolO-CQISM",
            authDomain: "kamwala-app-xyz123.firebaseapp.com",
            projectId: "kamwala-app-xyz123",
            storageBucket: "kamwala-app-xyz123.firebasestorage.app",
            messagingSenderId: "529469429266",
            appId: "1:529469429266:web:99cc209cc4e7bb0c5c2acb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Get action code from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const actionCode = urlParams.get('oobCode');
        const mode = urlParams.get('mode');

        const errorAlert = document.getElementById('errorAlert');
        const successAlert = document.getElementById('successAlert');
        const resetForm = document.getElementById('resetPasswordForm');
        const resetBtn = document.getElementById('resetBtn');

        if (!actionCode || mode !== 'resetPassword') {
            errorAlert.textContent = "Invalid or missing password reset code.";
            errorAlert.style.display = "block";
            resetBtn.disabled = true;
        } else {
            // Validate the code with Firebase
            try {
                const email = await verifyPasswordResetCode(auth, actionCode);
                document.querySelector('.reset-desc').innerHTML = `Resetting password for <b>${email}</b>`;
            } catch (error) {
                errorAlert.textContent = "The password reset link is invalid or has expired.";
                errorAlert.style.display = "block";
                resetBtn.disabled = true;
            }
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorAlert.style.display = "none";
            successAlert.style.display = "none";
            resetBtn.disabled = true;
            resetBtn.innerHTML = "<i class='ph ph-spinner ph-spin'></i> Updating...";

            const newPassword = document.getElementById('newPassword').value;

            try {
                await confirmPasswordReset(auth, actionCode, newPassword);
                successAlert.textContent = "Password updated successfully. Redirecting to login...";
                successAlert.style.display = "block";
                resetForm.style.display = "none";
                
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 2000);
            } catch (error) {
                errorAlert.textContent = "Error updating password: " + error.message;
                errorAlert.style.display = "block";
                resetBtn.disabled = false;
                resetBtn.innerHTML = "Update Password";
            }
        });
    </script>
</body>
</html>
